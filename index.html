<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مولد QR Code مجاني | WebBag</title>

<meta name="description" content="أنشئ رمز QR احترافي للروابط والنصوص وأرقام الهواتف مجانًا أونلاين.">

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>
<body>

<div class="container">

<div class="card">

<h1>مولد QR Code</h1>

<p class="subtitle">
أنشئ رمز QR احترافي للروابط والنصوص وأرقام الهواتف خلال ثوانٍ.
</p>

<input
type="text"
id="qrInput"
placeholder="أدخل الرابط أو النص هنا"
>

<button id="generateBtn">
إنشاء QR Code
</button>

<div id="qrContainer"></div>

<button
id="downloadBtn"
style="display:none;"
>
تنزيل QR Code
</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
